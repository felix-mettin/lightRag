<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LightRAG 试验树结构视图</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --panel: #f7f7f9;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --accent: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: #374151;
        --accent: #60a5fa;
      }
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      align-items: center;
    }
    input, select, button {
      width: 100%;
      min-width: 0;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 0 10px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
    }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      background: var(--accent);
      color: white;
      border: none;
    }
    button.secondary {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }
    .hint {
      font-size: 13px;
      color: var(--muted);
      margin: 10px 2px 14px;
    }
    .tree-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: var(--panel);
      min-height: 300px;
      overflow: auto;
    }
    .tree, .tree ul {
      list-style: none;
      margin: 0;
      padding-left: 18px;
    }
    .tree li {
      position: relative;
      margin: 5px 0;
    }
    .tree li::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 0.9em;
      width: 10px;
      border-top: 1px solid var(--line);
    }
    .tree li::after {
      content: "";
      position: absolute;
      left: -12px;
      top: -8px;
      bottom: -8px;
      border-left: 1px solid var(--line);
    }
    .tree li:last-child::after {
      bottom: 0.9em;
    }
    details > summary {
      cursor: pointer;
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
    }
    details > summary:hover {
      background: rgba(37, 99, 235, 0.12);
    }
    .leaf {
      padding: 2px 6px;
      border-radius: 6px;
      display: inline-block;
    }
    .leaf:hover {
      background: rgba(107, 114, 128, 0.12);
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .node-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: min(100%, 980px);
      min-width: 0;
      vertical-align: middle;
    }
    .node-title {
      min-width: 0;
      flex: 0 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .note-btn {
      height: 24px;
      padding: 0 8px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }
    .node-note {
      display: inline-block;
      font-size: 12px;
      color: var(--muted);
      background: rgba(107, 114, 128, 0.12);
      border-radius: 6px;
      padding: 1px 6px;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    .toggle input {
      height: auto;
      width: auto;
      margin: 0;
    }
    #apiBase {
      grid-column: span 4;
    }
    #apiKey {
      grid-column: span 3;
    }
    #standardType {
      grid-column: span 2;
    }
    #maxDepth,
    #maxLayers {
      grid-column: span 1;
    }
    .toggle {
      grid-column: span 1;
      min-width: 0;
    }
    #loadApiBtn,
    #resetBtn,
    #exportTreeBtn,
    #importTreeBtn {
      grid-column: span 2;
    }
    @media (max-width: 1100px) {
      #apiBase,
      #apiKey {
        grid-column: span 6;
      }
      #standardType,
      #maxDepth,
      #maxLayers,
      .toggle {
        grid-column: span 3;
      }
      #loadApiBtn,
      #resetBtn,
      #exportTreeBtn,
      #importTreeBtn {
        grid-column: span 6;
      }
    }
    @media (max-width: 720px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
      #apiBase,
      #apiKey,
      #standardType,
      #maxDepth,
      #maxLayers,
      .toggle,
      #loadApiBtn,
      #resetBtn,
      #exportTreeBtn,
      #importTreeBtn {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>LightRAG 知识图谱树状梳理</h2>
    <div class="toolbar">
      <input id="apiBase" value="http://127.0.0.1:9621" placeholder="API Base URL，例如 http://127.0.0.1:9621" />
      <input id="apiKey" placeholder="可选：Bearer Token / API Key" />
      <select id="standardType">
        <option value="" selected disabled>请选择工作空间</option>
        <option value="GB">GB</option>
        <option value="HB">HB</option>
        <option value="GJB">GJB</option>
        <option value="others">others</option>
      </select>
      <input id="maxDepth" type="number" min="1" value="4" placeholder="max_depth" />
      <input id="maxLayers" type="number" min="1" value="6" placeholder="递归层数" />
      <label class="toggle"><input id="recursiveMode" type="checkbox" checked />递归抓取</label>
      <button id="loadApiBtn">从 API 加载</button>
      <button id="resetBtn" class="secondary">恢复配置树</button>
      <button id="exportTreeBtn" class="secondary">导出JSON</button>
      <button id="importTreeBtn" class="secondary">导入JSON</button>
      <input id="importTreeFile" type="file" accept="application/json" style="display:none" />
    </div>
    <div class="hint">
      默认展示来自 `config.ini` 的四大试验树；递归抓取开启时，会按层递归查询 `/graphs` 把各层节点尽量抓全后再转树。
    </div>
    <div class="tree-card">
      <ul id="treeRoot" class="tree"></ul>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const ROOTS = [
      "绝缘性能型式试验",
      "温升性能型式试验",
      "开合性能型式试验",
      "短路性能型式试验"
    ];

    const CONFIG_TREE = {
      name: "型式试验",
      children: [
        {
          name: "绝缘性能型式试验",
          children: [
            { name: "工频耐受电压试验" },
            { name: "雷电冲击耐受电压试验" },
            { name: "操作冲击耐受电压试验" },
            { name: "控制和辅助回路的绝缘试验" }
          ]
        },
        {
          name: "温升性能型式试验",
          children: [
            { name: "连续电流试验" },
            { name: "前后回路电阻测量试验" },
            { name: "辅助和控制回路温升试验" }
          ]
        },
        {
          name: "开合性能型式试验",
          children: [
            { name: "容性电流开断试验(LC1)" },
            { name: "容性电流开断试验(LC2)" },
            { name: "容性电流开断试验(CC1)" },
            { name: "容性电流开断试验(CC2)" },
            { name: "容性电流开断试验(BC1)" },
            { name: "容性电流开断试验(BC2)" }
          ]
        },
        {
          name: "短路性能型式试验",
          children: [
            { name: "短路开断试验(T10)" },
            { name: "短路开断试验(T30)" },
            { name: "短路开断试验(T60)" },
            { name: "短路开断试验(T100s)" },
            { name: "短路开断试验(T100a)" },
            { name: "近区故障试验(L90)" },
            { name: "近区故障试验(L75)" },
            { name: "近区故障试验(L60)" },
            { name: "临界电流试验" },
            { name: "异相接地故障试验" },
            { name: "单相接地故障试验" },
            { name: "失步关合和开断试验(OP1)" },
            { name: "失步关合和开断试验(OP2)" }
          ]
        }
      ]
    };

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    let currentTree = null;

    function cloneTree(tree) {
      return JSON.parse(JSON.stringify(tree));
    }

    function editNodeNote(node) {
      const current = typeof node.note === "string" ? node.note : "";
      const next = window.prompt(`编辑备注：${node.name}\n（留空可清除）`, current);
      if (next === null) return false;
      const cleaned = next.trim();
      if (cleaned) {
        node.note = cleaned;
      } else {
        delete node.note;
      }
      return true;
    }

    function createNodeLabel(node) {
      const wrap = document.createElement("span");
      wrap.className = "node-label";

      const text = document.createElement("span");
      text.className = "node-title";
      text.textContent = node.name;
      wrap.appendChild(text);

      const actions = document.createElement("span");
      actions.className = "node-actions";

      if (typeof node.note === "string" && node.note.trim()) {
        const editBtn = document.createElement("button");
        editBtn.className = "note-btn";
        editBtn.type = "button";
        editBtn.textContent = "编辑";
        editBtn.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (!editNodeNote(node)) return;
          renderTree(currentTree);
        });
        actions.appendChild(editBtn);

        const removeBtn = document.createElement("button");
        removeBtn.className = "note-btn";
        removeBtn.type = "button";
        removeBtn.textContent = "删除";
        removeBtn.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          delete node.note;
          renderTree(currentTree);
        });
        actions.appendChild(removeBtn);

        const note = document.createElement("span");
        note.className = "node-note";
        note.textContent = node.note.trim();
        actions.appendChild(note);
      } else {
        const addBtn = document.createElement("button");
        addBtn.className = "note-btn";
        addBtn.type = "button";
        addBtn.textContent = "备注";
        addBtn.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (!editNodeNote(node)) return;
          renderTree(currentTree);
        });
        actions.appendChild(addBtn);
      }

      wrap.appendChild(actions);

      return wrap;
    }

    function renderTreeNode(node, path = "") {
      const nodePath = path ? `${path}/${node.name}` : node.name;
      const li = document.createElement("li");
      const hasChildren = Array.isArray(node.children) && node.children.length > 0;
      if (hasChildren) {
        const details = document.createElement("details");
        details.dataset.nodePath = nodePath;
        const summary = document.createElement("summary");
        summary.appendChild(createNodeLabel(node));
        details.appendChild(summary);
        const ul = document.createElement("ul");
        ul.className = "tree";
        for (const child of node.children) {
          ul.appendChild(renderTreeNode(child, nodePath));
        }
        details.appendChild(ul);
        li.appendChild(details);
      } else {
        const span = document.createElement("span");
        span.className = "leaf";
        span.appendChild(createNodeLabel(node));
        li.appendChild(span);
      }
      return li;
    }

    function renderTree(tree) {
      currentTree = tree;
      const root = document.getElementById("treeRoot");
      const openPaths = new Set(
        Array.from(root.querySelectorAll("details[data-node-path][open]")).map((el) => el.dataset.nodePath)
      );
      root.innerHTML = "";
      root.appendChild(renderTreeNode(tree));
      for (const details of root.querySelectorAll("details[data-node-path]")) {
        if (openPaths.has(details.dataset.nodePath)) details.open = true;
      }
    }

    function sanitizeNode(rawNode) {
      if (!rawNode || typeof rawNode !== "object") {
        throw new Error("节点格式不正确。");
      }
      const name = typeof rawNode.name === "string" ? rawNode.name.trim() : "";
      if (!name) {
        throw new Error("节点缺少 name 字段。");
      }
      const cleanNode = { name };
      if (typeof rawNode.note === "string" && rawNode.note.trim()) {
        cleanNode.note = rawNode.note.trim();
      }
      if (Array.isArray(rawNode.children) && rawNode.children.length > 0) {
        cleanNode.children = rawNode.children.map(sanitizeNode);
      }
      return cleanNode;
    }

    function exportCurrentTree() {
      if (!currentTree) {
        setStatus("没有可导出的树数据。");
        return;
      }
      const payload = {
        version: 1,
        exported_at: new Date().toISOString(),
        tree: currentTree
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const dt = new Date();
      const stamp = `${dt.getFullYear()}${String(dt.getMonth() + 1).padStart(2, "0")}${String(dt.getDate()).padStart(2, "0")}_${String(dt.getHours()).padStart(2, "0")}${String(dt.getMinutes()).padStart(2, "0")}${String(dt.getSeconds()).padStart(2, "0")}`;
      a.href = url;
      a.download = `electrical_test_tree_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus("已导出当前树与全部节点备注。");
    }

    async function importTreeFromFile(file) {
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const hasTree = parsed && typeof parsed === "object" && parsed.tree && typeof parsed.tree === "object";
        const treeRaw = hasTree ? parsed.tree : parsed;
        const cleanTree = sanitizeNode(treeRaw);
        renderTree(cleanTree);
        setStatus("已导入 JSON 并恢复树结构与节点备注。");
      } catch (error) {
        setStatus(`导入失败：${error.message}`);
      }
    }

    function nodeProps(node) {
      return (node && node.properties) || {};
    }

    function nodeDisplayName(node, fallbackId = "") {
      const p = nodeProps(node);
      return p.name || p.report_type || p.test_item || p.param_name || node?.id || fallbackId;
    }

    function buildSchemaTreeFromGraph(rootLabel, reportNodeId, graph) {
      const nodes = graph.nodes || [];
      const edges = graph.edges || [];
      const nodeById = new Map(nodes.map((n) => [n.id, n]));

      const outgoing = new Map();
      function addOutgoing(src, relType, tgt, edgeProps) {
        const key = `${src}||${relType}`;
        if (!outgoing.has(key)) outgoing.set(key, []);
        outgoing.get(key).push({ targetId: tgt, edgeProps });
      }

      for (const edge of edges) {
        const ep = (edge && edge.properties) || {};
        const relType = ep.rel_type || edge.type || "";
        const src = ep.src_id || edge.source;
        const tgt = ep.tgt_id || edge.target;
        if (!src || !tgt || !relType) continue;
        addOutgoing(src, relType, tgt, ep);
      }

      function getTargets(srcId, relType) {
        return outgoing.get(`${srcId}||${relType}`) || [];
      }

      let realReportId = reportNodeId;
      const reportNode = nodeById.get(realReportId);
      const rp = nodeProps(reportNode);
      if (!(rp.entity_type === "ReportType")) {
        for (const node of nodes) {
          const p = nodeProps(node);
          if (p.entity_type === "ReportType" && (p.report_type === rootLabel || p.name === rootLabel)) {
            realReportId = node.id;
            break;
          }
        }
      }

      const testLinks = getTargets(realReportId, "INCLUDES_TEST");
      const testItems = [];

      for (const link of testLinks) {
        const testId = link.targetId;
        const testNode = nodeById.get(testId);
        if (!testNode) continue;
        const tp = nodeProps(testNode);
        const isTestItem =
          tp.entity_type === "TestItem" ||
          Boolean(tp.test_item) ||
          Boolean(tp.name) ||
          (testNode.id && String(testNode.id).startsWith("test:")) ||
          (Array.isArray(testNode.labels) && testNode.labels.includes("TestItem"));
        if (!isTestItem) continue;

        const paramLinks = getTargets(testId, "HAS_PARAMETER");
        const params = [];
        for (const pl of paramLinks) {
          const paramNode = nodeById.get(pl.targetId);
          if (!paramNode) continue;
          const pp = nodeProps(paramNode);
          const isParam =
            pp.entity_type === "TestParameter" ||
            Boolean(pp.param_name) ||
            Boolean(pp.param_key) ||
            Boolean(pp.name) ||
            (paramNode.id && String(paramNode.id).startsWith("param:")) ||
            (Array.isArray(paramNode.labels) && paramNode.labels.includes("TestParameter"));
          if (!isParam) continue;

          const cnName = pp.param_name || pp.name || pp.param_key || String(paramNode.id || "参数");
          const valueCore = [pp.value_text, pp.value_expr].filter(Boolean).join(" / ");
          const value = [valueCore, pp.unit].filter(Boolean).join(" ").trim() || "（未提取到具体值）";
          params.push({ name: `${cnName}: ${value}` });
        }

        const conditionItems = [];
        if (link.edgeProps && link.edgeProps.condition) {
          conditionItems.push({ name: `执行条件: ${link.edgeProps.condition}` });
        }

        const ruleLinks = getTargets(testId, "HAS_RULE");
        for (const rl of ruleLinks) {
          const ruleNode = nodeById.get(rl.targetId);
          const rp = nodeProps(ruleNode);
          if (rp.entity_type !== "TestRule") continue;
          const parts = [rp.name, rp.condition, rp.expression].filter(Boolean);
          if (parts.length > 0) {
            conditionItems.push({ name: `规则: ${parts.join(" | ")}` });
          }
        }

        const clauseLinks = getTargets(testId, "BASED_ON");
        const clauses = [];
        for (const cl of clauseLinks) {
          const clauseNode = nodeById.get(cl.targetId);
          const cp = nodeProps(clauseNode);
          if (cp.entity_type !== "StandardClause") continue;
          const quote = (cp.quote || "").trim();
          if (quote) {
            clauses.push({ name: quote.length > 160 ? `${quote.slice(0, 160)}...` : quote });
          } else {
            const clauseInfo = [cp.clause_id, cp.clause_title].filter(Boolean).join(" ");
            if (clauseInfo) clauses.push({ name: clauseInfo });
          }
        }

        const testName = tp.test_item || tp.name || nodeDisplayName(testNode, testId);
        const testChildren = [];
        if (params.length > 0) testChildren.push({ name: "特征值", children: params });
        if (conditionItems.length > 0) testChildren.push({ name: "条件/规则", children: conditionItems });
        if (clauses.length > 0) testChildren.push({ name: "原文切块", children: clauses });

        testItems.push({ name: testName, children: testChildren });
      }

      return { name: rootLabel, children: testItems };
    }

    function mergeGraphs(graphs) {
      const nodeMap = new Map();
      const edgeMap = new Map();
      for (const graph of graphs) {
        for (const node of (graph.nodes || [])) {
          nodeMap.set(node.id, node);
        }
        for (const edge of (graph.edges || [])) {
          const key = `${edge.source}=>${edge.target}::${edge.type || ""}`;
          edgeMap.set(key, edge);
        }
      }
      return {
        nodes: Array.from(nodeMap.values()),
        edges: Array.from(edgeMap.values())
      };
    }

    function labelsFromGraph(graph) {
      const labels = new Set();
      for (const node of (graph.nodes || [])) {
        if (node.id) labels.add(node.id);
        const label = (node.labels || []).find(Boolean);
        if (label) labels.add(label);
      }
      return Array.from(labels);
    }

    const PAGE_STATE_KEY = "electrical_test_tree_page_state";

    function getPageState() {
      return {
        apiBase: document.getElementById("apiBase").value.trim(),
        apiKey: document.getElementById("apiKey").value.trim(),
        standardType: document.getElementById("standardType").value.trim(),
        maxDepth: document.getElementById("maxDepth").value.trim(),
        maxLayers: document.getElementById("maxLayers").value.trim(),
        recursiveMode: document.getElementById("recursiveMode").checked
      };
    }

    function persistPageState() {
      try {
        localStorage.setItem(PAGE_STATE_KEY, JSON.stringify(getPageState()));
      } catch (error) {
        console.warn("保存页面参数失败", error);
      }
    }

    function restorePageState() {
      try {
        const raw = localStorage.getItem(PAGE_STATE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        if (!state || typeof state !== "object") return;

        if (typeof state.apiBase === "string") {
          document.getElementById("apiBase").value = state.apiBase;
        }
        if (typeof state.apiKey === "string") {
          document.getElementById("apiKey").value = state.apiKey;
        }
        if (typeof state.standardType === "string") {
          document.getElementById("standardType").value = state.standardType;
        }
        if (typeof state.maxDepth === "string" && state.maxDepth) {
          document.getElementById("maxDepth").value = state.maxDepth;
        }
        if (typeof state.maxLayers === "string" && state.maxLayers) {
          document.getElementById("maxLayers").value = state.maxLayers;
        }
        if (typeof state.recursiveMode === "boolean") {
          document.getElementById("recursiveMode").checked = state.recursiveMode;
        }
      } catch (error) {
        console.warn("恢复页面参数失败", error);
      }
    }

    function bindPageStatePersistence() {
      const fieldIds = ["apiBase", "apiKey", "standardType", "maxDepth", "maxLayers"];
      for (const id of fieldIds) {
        const element = document.getElementById(id);
        element.addEventListener("input", persistPageState);
        element.addEventListener("change", persistPageState);
      }
      document.getElementById("recursiveMode").addEventListener("change", persistPageState);
    }

    async function fetchGraphByLabel(base, token, label, maxDepth, standardType = "") {
      const query = new URLSearchParams({
        label,
        max_depth: String(maxDepth),
        max_nodes: "1200"
      });
      if (standardType) query.set("standard_type", standardType);
      const headers = token ? { Authorization: `Bearer ${token}` } : {};
      const response = await fetch(`${base.replace(/\/$/, "")}/graphs?${query}`, { headers });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`${label}: ${response.status} ${text}`);
      }
      return response.json();
    }

    async function searchLabels(base, token, query, limit = 20, standardType = "") {
      const headers = token ? { Authorization: `Bearer ${token}` } : {};
      const params = new URLSearchParams({ q: query, limit: String(limit) });
      if (standardType) params.set("standard_type", standardType);
      const response = await fetch(`${base.replace(/\/$/, "")}/graph/label/search?${params}`, { headers });
      if (!response.ok) return [];
      return response.json();
    }

    async function resolveBestRootLabel(base, token, expectedRoot, standardType = "") {
      const candidates = await searchLabels(base, token, expectedRoot, 30, standardType);
      if (!Array.isArray(candidates) || candidates.length === 0) return expectedRoot;

      const exactReport = candidates.find((x) => x === `report:${expectedRoot}`);
      if (exactReport) return exactReport;

      const exact = candidates.find((x) => x === expectedRoot);
      if (exact) return exact;

      const contains = candidates.find((x) => x.includes(expectedRoot));
      if (contains) return contains;

      const reverseContains = candidates.find((x) => expectedRoot.includes(x));
      if (reverseContains) return reverseContains;

      return candidates[0];
    }

    async function fetchGraphRecursive(base, token, rootLabel, maxLayers, standardType = "") {
      const visitedLabels = new Set([rootLabel]);
      let frontier = [rootLabel];
      const allGraphs = [];

      for (let layer = 1; layer <= maxLayers; layer++) {
        if (frontier.length === 0) break;
        setStatus(`递归抓取中：${rootLabel}，第 ${layer}/${maxLayers} 层（${frontier.length} 个节点）`);
        const layerGraphs = [];
        for (const label of frontier) {
          const graph = await fetchGraphByLabel(base, token, label, 1, standardType);
          layerGraphs.push(graph);
          allGraphs.push(graph);
        }

        const next = [];
        for (const graph of layerGraphs) {
          for (const label of labelsFromGraph(graph)) {
            if (visitedLabels.has(label)) continue;
            visitedLabels.add(label);
            next.push(label);
          }
        }
        frontier = next;
      }

      return mergeGraphs(allGraphs);
    }

    async function loadFromApi() {
      persistPageState();
      const base = document.getElementById("apiBase").value.trim();
      const token = document.getElementById("apiKey").value.trim();
      const standardType = document.getElementById("standardType").value.trim();
      const maxDepth = Number(document.getElementById("maxDepth").value) || 4;
      const maxLayers = Number(document.getElementById("maxLayers").value) || 6;
      const recursiveMode = document.getElementById("recursiveMode").checked;
      if (!base) {
        setStatus("请先填写 API Base URL。");
        return;
      }
      if (!standardType) {
        setStatus("请先选择工作空间。")
        return;
      }

      setStatus(
        (recursiveMode ? "正在递归抓取四大试验图..." : "正在从 API 拉取四大试验图...") +
        ` workspace=${standardType}`
      );
      try {
        const trees = [];
        const summary = [];
        for (const rootLabel of ROOTS) {
          const resolvedRoot = await resolveBestRootLabel(base, token, rootLabel, standardType);
          const graph = recursiveMode
            ? await fetchGraphRecursive(base, token, resolvedRoot, maxLayers, standardType)
            : await fetchGraphByLabel(base, token, resolvedRoot, maxDepth, standardType);
          const tree = buildSchemaTreeFromGraph(rootLabel, resolvedRoot, graph);
          trees.push(tree);
          summary.push(`${rootLabel}:${(graph.nodes || []).length}N/${(graph.edges || []).length}E`);
        }
        renderTree({ name: "型式试验", children: trees });
        setStatus(
          (recursiveMode ? "已递归抓取并转换为树结构。 " : "已加载 API 图并转换为树结构。 ") +
          `workspace=${standardType}. ` +
          summary.join(" | ")
        );
      } catch (error) {
        setStatus(`API 加载失败：${error.message}`);
      }
    }

    restorePageState();
    bindPageStatePersistence();

    document.getElementById("loadApiBtn").addEventListener("click", loadFromApi);
    document.getElementById("resetBtn").addEventListener("click", () => {
      renderTree(cloneTree(CONFIG_TREE));
      setStatus("已恢复为 config.ini 结构树。");
    });
    document.getElementById("exportTreeBtn").addEventListener("click", exportCurrentTree);
    document.getElementById("importTreeBtn").addEventListener("click", () => {
      document.getElementById("importTreeFile").click();
    });
    document.getElementById("importTreeFile").addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      event.target.value = "";
      if (!file) return;
      await importTreeFromFile(file);
    });

    renderTree(cloneTree(CONFIG_TREE));
    setStatus("已加载 config.ini 四大试验树。");
  </script>
</body>
</html>
